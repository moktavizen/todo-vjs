<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ralin.td</title>
  </head>
  <body>
    <span class="sidebar">
      <nav id="sidebar-nav" class="sidebar-nav">
        <a href="#" class="logo"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-list-todo-icon lucide-list-todo"
          >
            <path d="M13 5h8" />
            <path d="M13 12h8" />
            <path d="M13 19h8" />
            <path d="m3 17 2 2 4-4" />
            <rect x="3" y="4" width="6" height="6" rx="1" />
          </svg>
          ralin.td</a
        >
        <div class="time-label">Time</div>
        <button id="all-page-btn" class="page-btn curr-page">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-calendar-days-icon lucide-calendar-days"
          >
            <path d="M8 2v4" />
            <path d="M16 2v4" />
            <rect width="18" height="18" x="3" y="4" rx="2" />
            <path d="M3 10h18" />
            <path d="M8 14h.01" />
            <path d="M12 14h.01" />
            <path d="M16 14h.01" />
            <path d="M8 18h.01" />
            <path d="M12 18h.01" />
            <path d="M16 18h.01" /></svg
          >All
        </button>
        <button id="today-page-btn" class="page-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-calendar-icon lucide-calendar"
          >
            <path d="M8 2v4" />
            <path d="M16 2v4" />
            <rect width="18" height="18" x="3" y="4" rx="2" />
            <path d="M3 10h18" /></svg
          >Today
        </button>
        <button id="upcoming-page-btn" class="page-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-calendar-fold-icon lucide-calendar-fold"
          >
            <path
              d="M3 20a2 2 0 0 0 2 2h10a2.4 2.4 0 0 0 1.706-.706l3.588-3.588A2.4 2.4 0 0 0 21 16V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2z"
            />
            <path d="M15 22v-5a1 1 0 0 1 1-1h5" />
            <path d="M8 2v4" />
            <path d="M16 2v4" />
            <path d="M3 10h18" /></svg
          >Upcoming
        </button>
        <button id="past-page-btn" class="page-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-calendar-clock-icon lucide-calendar-clock"
          >
            <path d="M16 14v2.2l1.6 1" />
            <path d="M16 2v4" />
            <path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5" />
            <path d="M3 10h5" />
            <path d="M8 2v4" />
            <circle cx="16" cy="16" r="6" /></svg
          >Past
        </button>
        <div class="projects-label-wrapper">
          <div>Projects</div>
          <dialog id="add-project-dialog">
            <h2>Add Project</h2>
            <form id="add-project-form">
              <div>
                <label for="project-title-input">Title</label>
                <input type="text" id="project-title-input" placeholder="Todo App" required />
              </div>
              <div>
                <button class="confirm-btn" id="confirm-add-project-btn" type="submit" autofocus>
                  Confirm
                </button>
                <button class="cancel-btn" formmethod="dialog" formnovalidate>Cancel</button>
              </div>
            </form>
          </dialog>
          <button id="add-project-btn" class="add-project-btn">Add Project</button>
        </div>
        <div id="project-list" class="project-list">
          <button></button>
        </div>
      </nav>
      <a href="https://github.com/moktavizen/todo-vjs" target="_blank" class="github-link"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-github-icon lucide-github"
        >
          <path
            d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
          />
          <path d="M9 18c-4.51 2-5-2-7-2" /></svg
        >github.com/moktavizen</a
      >
    </span>
    <span class="content-container">
      <nav id="content-nav" class="content-nav">
        <h1 id="page-heading">All</h1>
        <dialog id="edit-project-dialog">
          <h2>Edit Project</h2>
          <form id="edit-project-form">
            <div>
              <label for="edit-project-title">Title</label>
              <input type="text" id="edit-project-title" placeholder="Todo App" required />
            </div>
            <div>
              <button class="confirm-btn" id="confirm-edit-project-btn" type="submit" autofocus>
                Confirm
              </button>
              <button class="delete-btn" id="delete-project-btn" type="submit" autofocus>
                Delete
              </button>
              <button class="cancel-btn" formmethod="dialog" formnovalidate>Cancel</button>
            </div>
          </form>
        </dialog>
        <button id="edit-project-btn" class="edit-project-btn">Edit Project</button>
        <dialog id="add-task-dialog">
          <h2 id="add-task-form-heading">Add Task</h2>
          <form id="add-task-form">
            <div>
              <label for="task-title-input">Title</label>
              <input type="text" id="task-title-input" placeholder="Buy groceries" required />
            </div>
            <div>
              <label for="task-description-input">Description (Optional)</label>
              <input type="text" id="task-description-input" placeholder="Avocado, Guava, Potato" />
            </div>
            <div class="date-priority-wrapper">
              <div>
                <label for="task-date-input">Due Date</label>
                <input type="datetime-local" id="task-date-input" class="due-date" required />
              </div>
              <div>
                <label for="task-priority-select">Priority</label>
                <select name="taskPriority" id="task-priority-select">
                  <option>Low</option>
                  <option>Medium</option>
                  <option>High</option>
                </select>
              </div>
            </div>
            <div>
              <button class="confirm-btn" id="confirm-add-task-btn" type="submit" autofocus>
                Confirm
              </button>
              <button class="cancel-btn" formmethod="dialog" formnovalidate>Cancel</button>
            </div>
          </form>
        </dialog>
        <button id="add-task-btn" class="add-task-btn">Add Task</button>
      </nav>
      <dialog id="read-task-dialog">
        <h2 id="read-task-form-heading">View Task</h2>
        <form id="read-task-form">
          <div>
            <label for="read-task-title">Title</label>
            <input
              type="text"
              id="read-task-title"
              placeholder="Buy groceries"
              required
              value="Buy groceries"
              disabled
            />
          </div>
          <div>
            <label for="read-task-description">Description (Optional)</label>
            <input type="text" id="read-task-description" value="Avocado, Guava, Potato" disabled />
          </div>
          <div class="date-priority-wrapper">
            <div>
              <label for="read-task-date">Due Date</label>
              <input
                type="datetime-local"
                id="read-task-date"
                class="due-date"
                required
                value="2021-01-01T16:00"
                disabled
              />
            </div>
            <div>
              <label for="task-priority-select">Priority</label>
              <select name="taskPriority" id="read-task-priority" disabled>
                <option id="low-priority-option">Low</option>
                <option id="medium-priority-option">Medium</option>
                <option id="high-priority-option">High</option>
              </select>
            </div>
          </div>
          <div>
            <button class="edit-btn" id="edit-read-task-btn" type="submit" autofocus>Edit</button>
            <button class="cancel-btn" id="cancel-read-task-btn" formmethod="dialog" formnovalidate>
              Cancel
            </button>
          </div>
        </form>
      </dialog>
      <div id="content"></div>
    </span>
  </body>
</html>
